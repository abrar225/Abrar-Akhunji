<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenRouter API Test</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #1a1a1a; color: #fff; }
        button { background: #8b5cf6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-right: 10px; font-weight: bold; }
        button:hover { background: #7c3aed; }
        pre { background: #000; padding: 15px; border-radius: 8px; overflow-x: auto; border: 1px solid #333; }
        h1, h2 { color: #a78bfa; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
        .card { background: #2a2a2a; padding: 10px; border-radius: 8px; border: 1px solid #444; font-size: 14px; }
    </style>
</head>
<body>
    <h1>OpenRouter API Tester</h1>
    <p>Using key: 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</p>
    
    <div>
        <button onclick="testChat()">1. Test minimax/minimax-m2.5:free</button>
        <button onclick="fetchModels()">2. Discover All Models</button>
    </div>

    <h2>Output</h2>
    <div id="output" style="display: none;">
        <pre id="jsonOutput">Loading...</pre>
    </div>
    <div id="modelsGrid" class="grid" style="display: none; margin-top: 20px;"></div>

    <script>
        const API_KEY = "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";

        async function testChat() {
            const outDiv = document.getElementById("output");
            const pre = document.getElementById("jsonOutput");
            document.getElementById("modelsGrid").style.display = "none";
            outDiv.style.display = "block";
            pre.innerText = "Sending request to OpenRouter...";

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`,
                    },
                    body: JSON.stringify({
                        model: "minimax/minimax-m2.5:free",
                        messages: [
                            { role: "user", content: "Hello! Reply with a short confirmation if you can read this." }
                        ]
                    })
                });

                const data = await response.json();
                pre.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                pre.innerText = "Error: " + err.message;
            }
        }

        async function fetchModels() {
            const outDiv = document.getElementById("output");
            const pre = document.getElementById("jsonOutput");
            const grid = document.getElementById("modelsGrid");
            grid.style.display = "none";
            outDiv.style.display = "block";
            pre.innerText = "Fetching models...";

            try {
                const response = await fetch("https://openrouter.ai/api/v1/models");
                const data = await response.json();
                
                const freeModels = data.data.filter(m => m.id.includes("free"));
                
                pre.innerText = `Total Models Found: ${data.data.length}\nFree Models Found: ${freeModels.length}\n\nListing Free Models below:`;
                
                grid.innerHTML = "";
                freeModels.forEach(model => {
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.innerHTML = `<strong>${model.id}</strong><br>Context Length: ${model.context_length}`;
                    grid.appendChild(el);
                });
                grid.style.display = "grid";
            } catch (err) {
                pre.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
