<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace">
  <rect width="1600" height="1000" fill="#0D0C0A"/>
  <rect x="0" y="0" width="1600" height="1000" fill="url(#g)"/>
  <defs>
    <radialGradient id="g" cx="18%" cy="12%" r="90%">
      <stop offset="0%" stop-color="#1A150F"/>
      <stop offset="100%" stop-color="#0D0C0A"/>
    </radialGradient>
  </defs>

  <!-- FixO ASCII logo (ember) -->
  <g fill="#FF5A1F" font-size="40" xml:space="preserve" letter-spacing="0">
    <text x="70" y="150"> ___ ___  __  __ ___      ___ _    ___ </text>
    <text x="70" y="196">| __|_ _| \ \/ / _ \     / __| |  |_ _|</text>
    <text x="70" y="242">| _| | |   &gt;  &lt; (_) |   | (__| |__ | | </text>
    <text x="70" y="288">|_| |___| /_/\_\___/     \___|____|___|</text>
  </g>

  <text x="70" y="352" font-size="26" fill="#8A8578">v2.0.0 · autonomous · free · multi-provider · freellmapi</text>

  <!-- session prompt -->
  <text x="70" y="452" font-size="30" fill="#F4F1EA" xml:space="preserve">abrar@mac ~ % <tspan fill="#FF7A45">fixo run "fix build error"</tspan></text>

  <!-- routing / output log -->
  <g font-size="25" xml:space="preserve">
    <text x="70" y="510" fill="#8A8578">[Routing Engine] bug_fix detected → CoreEngine…</text>
    <text x="70" y="558" fill="#F4F1EA">&gt; Scanning workspace context…</text>
    <text x="70" y="606" fill="#F4F1EA">&gt; Found 1 build blocker in src/components/Background3D.jsx</text>
    <text x="98" y="654" fill="#FF6B5E">TypeError: window.VANTA.NET is not a function</text>
    <text x="70" y="702" fill="#F4F1EA">&gt; Rewriting component with local WebGL particles…</text>
    <text x="70" y="756" fill="#3FB950">✔ Project built successfully  ·  dist/ compiled in 633ms</text>
  </g>

  <!-- blinking-style prompt block -->
  <text x="70" y="838" font-size="30" fill="#F4F1EA">$</text>
  <rect x="96" y="815" width="18" height="30" fill="#FF5A1F"/>

  <!-- corner tag -->
  <text x="1530" y="945" font-size="22" fill="#565046" text-anchor="end">fixo — terminal</text>
</svg>
